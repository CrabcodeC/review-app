<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Review App - So sánh</title>
  </head>
  <body>
    <section id="section-header">
      <div class="container">
        <header class="site-header">
          <div class="logo">
            <img src="./img/logo.png" alt="AppReview Logo" />
          </div>
          <nav class="main-nav">
            <a href="index.html" class="nav-link">TRANG CHỦ</a>
            <a href="danhmuc.html" class="nav-link">DANH MỤC</a>
            <a href="sosanh.html" class="nav-link active">SO SÁNH</a>
            <a href="bangxephang.html" class="nav-link">BẢNG XẾP HẠNG</a>
          </nav>
          <div class="search-container">
            <input
              type="text"
              class="search-input"
              placeholder="Tìm ứng dụng..."
            />
            <button class="search-btn">
              <img src="./img/iconSearch.png" alt="" />
            </button>
          </div>
        </header>
      </div>
    </section>

    <section id="section-main">
      <div class="container">
        <main class="main-content-area">
          <h2 style="text-align: center; margin-bottom: 40px">
            So sánh ứng dụng
          </h2>
          <div class="compare-box">
            <div class="compare-slot" id="slot1">
              <p>Chọn ứng dụng 1</p>
            </div>
            <div class="vs">VS</div>
            <div class="compare-slot" id="slot2">
              <p>Chọn ứng dụng 2</p>
            </div>
          </div>
          <h3 style="margin: 40px 0 25px">Chọn ứng dụng để so sánh</h3>
          <div class="app-select-list">
            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="img/iconApp/tiktok.png"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>TikTok</h4>
                  <small>Xã hội</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="./img/iconApp/ins.webp"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>Instagram</h4>
                  <small>Xã hội</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="img/iconApp/capcut.jpg"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>CapCut</h4>
                  <small>Ảnh & Video</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="img/iconApp/duolingo.jpg"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>Duolingo</h4>
                  <small>Học tập</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="img/iconApp/spotify.png"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>Spotify</h4>
                  <small>Âm nhạc</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="img/iconApp/shoppe.png"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>Shopee</h4>
                  <small>Mua sắm</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="img/iconApp/canva.jpg"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>Canva</h4>
                  <small>Thiết kế</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>

            <div class="app-select-item">
              <div class="app-info">
                <img
                  src="./img/iconApp/grab.jpg"
                  alt=""
                  class="app-icon-small"
                />
                <div>
                  <h4>Grab</h4>
                  <small>Đời sống</small>
                </div>
              </div>
              <button class="btn-add">+ So sánh</button>
            </div>
          </div>
        </main>
      </div>
    </section>
  </body>
</html>
